#!/usr/sbin/nft -f

flush ruleset

table ip filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Allow loopback
        iif "lo" accept

        # Allow specific services on the local interface
        iifname "wifi_int" udp dport { 53, 67, 68 } accept

        # Allow return traffic for outgoing connections
        ct state established,related accept
    }

    chain forward {
        type filter hook forward priority filter; policy accept;

        # Allow traffic from internal to external
        iifname "wifi_int" oifname "wifi_ext" accept

        # Allow established/related traffic back through
        iifname "wifi_ext" oifname "wifi_int" ct state established,related accept
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Enable Masquerading (NAT) for the external interface
        oifname "wifi_ext" masquerade
    }
}
